version: '3.8'

services:
  nginx-proxy:
    image: nginx:alpine
    ports:
      - "4141:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - bunx-copilot-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "80"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  bunx-copilot-api:
    build: .
    expose:
      - "4141"
    environment:
      - NODE_ENV=production
      - PORT=4141
    restart: unless-stopped
    volumes:
      - copilot_auth:/root/.local/share/copilot-api
      - copilot_config:/root/.config
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4141/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  copilot_auth:
  copilot_config: