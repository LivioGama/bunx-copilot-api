version: '3.8'

services:
  bunx-copilot-api:
    build: .
    ports:
      - "4141:4141"
    environment:
      - NODE_ENV=production
      - PORT=4141
    restart: unless-stopped
    volumes:
      - copilot_auth:/root/.local/share/copilot-api
      - copilot_config:/root/.config
    labels:
      # Dokploy-compatible Traefik IP whitelist
      - "traefik.enable=true"
      - "traefik.http.middlewares.copilot-ipwhitelist.ipwhitelist.sourcerange=31.165.224.115/32,127.0.0.1/32"
      - "traefik.http.routers.liviogamabunxcopilotapi-xldixg.middlewares=copilot-ipwhitelist@docker"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4141/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  copilot_auth:
  copilot_config: