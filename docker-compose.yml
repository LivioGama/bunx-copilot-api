version: '3.8'

services:
  bunx-copilot-api:
    build: .
    ports:
      - "4141:4141"
    environment:
      - NODE_ENV=production
      - PORT=4141
      - API_KEY=${API_KEY:-your-secure-api-key-here}
      - COPILOT_API_KEY=${COPILOT_API_KEY}
      - AUTH_TOKEN=${AUTH_TOKEN}
    restart: unless-stopped
    volumes:
      - copilot_auth:/root/.local/share/copilot-api
      - copilot_config:/root/.config
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4141/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  copilot_auth:
  copilot_config: