version: '3.8'

services:
  bunx-copilot-api:
    build: .
    ports:
      - "4141:4141"
    environment:
      - NODE_ENV=production
      - PORT=4141
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4141/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s